<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Control System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styleNav.css') }}">
    {% block styles %}{% endblock %}  <!-- Bloque para estilos adicionales -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script> <!-- Plotly para gráficos -->
</head>
<body>
    <div class="sidebar">
        <h2>Trading Menu</h2>
        <a href="{{ url_for('inicio') }}">Inicio</a>
        <a href="{{ url_for('register_trade') }}">Registrar Trade</a>
        <a href="{{ url_for('estadisticas') }}">Estadísticas</a>
        <a href="{{ url_for('historial') }}">Historial</a>
        <a href="{{ url_for('scripts') }}">Scripts</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
    <div class="content">
        {% block content %}{% endblock %}

        {% if welcome_message %}
            <script>
                Swal.fire({
                    icon: 'success',
                    title: '{{ welcome_message }}',
                    text: '¡Bienvenido al sistema de trading!'
                });
            </script>
        {% endif %}

</body>
</html>
